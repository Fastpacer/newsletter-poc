<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subscribe — Newsletter</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="newsletter.css">
</head>
<body>
  <div class="container" style="display:flex;min-height:100vh;align-items:center;justify-content:center;">
    <button class="btn-primary" onclick="openSubscribeModal()" style="font-size:1rem;padding:14px 40px;">
      Subscribe to Newsletter
    </button>
  </div>

  <!-- Subscribe Modal -->
  <div id="subscribeModal" class="modal">
    <div class="modal-overlay" onclick="closeSubscribeModal()"></div>
    <div class="modal-content">
      <button class="modal-close" onclick="closeSubscribeModal()">✕</button>
      <h2 style="font-family:'Sora',sans-serif;font-weight:700;font-size:1.5rem;color:#E5E7EB;margin-bottom:8px;">Join Our Newsletter</h2>
      <p style="color:#9CA3AF;margin-bottom:24px;font-size:0.95rem;">Get exclusive insights delivered to your inbox.</p>

      <div style="margin-bottom:20px;">
        <label class="form-label" for="emailInput">Email Address</label>
        <input type="email" id="emailInput" class="form-input" placeholder="you@example.com" oninput="validateEmailRealTime()" />
        <div id="emailError" class="error-message"></div>
        <div id="emailValidation" class="validation-message"></div>
      </div>

      <button id="subscribeBtn" class="btn-primary" onclick="submitSubscription()" style="width:100%;font-size:1rem;padding:12px;margin-top:24px;">Subscribe</button>

      <div id="successMessage" class="success-message" style="display:none;margin-top:16px;">✓ Check your inbox! Verification email sent.</div>

      <p style="margin-top:16px;font-size:0.85rem;color:#6B7280;text-align:center;">We respect your privacy. Unsubscribe anytime.</p>
    </div>
  </div>

  <!-- CAPTCHA Modal -->
  <div id="captchaModal" class="modal">
    <div class="modal-overlay" onclick="closeCaptchaModal()"></div>
    <div class="modal-content">
      <button class="modal-close" onclick="closeCaptchaModal()">✕</button>
      <h2 style="font-family:'Sora',sans-serif;font-weight:700;font-size:1.5rem;color:#E5E7EB;margin-bottom:8px;">Verify You're Human</h2>
      <p style="color:#9CA3AF;margin-bottom:24px;font-size:0.95rem;">Please answer the simple math question to continue.</p>

      <div style="margin-bottom:20px;">
        <p id="captchaQuestion" style="background:rgba(249,115,22,0.08);border:1px solid rgba(249,115,22,0.3);color:#E5E7EB;font-size:1.8rem;font-weight:800;padding:24px;border-radius:12px;margin-bottom:20px;text-align:center;font-family:'Sora',sans-serif;"></p>
        <input type="number" id="captchaAnswer" class="form-input" placeholder="Your answer" />
        <div id="captchaError" class="error-message"></div>
      </div>

      <button id="verifyCaptchaBtn" class="btn-primary" onclick="verifyCaptcha()" style="width:100%;font-size:1rem;padding:12px;margin-top:24px;">Verify & Subscribe</button>

      <p style="margin-top:16px;font-size:0.85rem;color:#6B7280;text-align:center;">Can't see the question? <span style="color:var(--accent);cursor:pointer;" onclick="generateCaptcha()">Generate new</span></p>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="newsletter.js"></script>
</body>
</html>
